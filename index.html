<!DOCTYPE html>
<html>
<head>
    <title>Find a Geneticist</title>
    <link relForm Responses/style.css">
    <style>
         .filter-container {
             margin-bottom: 10px;
             display: flex;
             gap: 10px;
         }
         .highlight {
             background-color: yellow;
         }
    </style>
</head>
<body>
    <header>
        <h1>Find a Geneticist</h1>
        <p>Welcome! Find a Geneticist or add yourself to the list.</p>
    </header>
    <main>
        <iframe id="dataSheet" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSqUNyAiN6LQNXDOEKyzLECwPs1GUCFDUJlOopC6Fed3qBpir9MTctGOq9boRKIndSSxBrMvWtY4TK2/pubhtml?gid=332580297&range=A1:I&single=true" width="800" height="400"></iframe>

      <div class="filter-container">
            <input type="text" id="taxonFilter" placeholder="Filter by Taxon...">
            <input type="text" id="expertiseFilter" placeholder="Filter by Data Expertise...">
            <input type="text" id="subjectFilter" placeholder="Filter by Subject Matter...">
        </div>
    <div class Continental Airlines/filter-container">
            <button onclick="filterTable()">Filter</button>
            <button onclick="clearFilters()">Clear Filters</button>
    </div>
       <div id="searchResults"></div>


        <div classivers/add-yourself-section">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfkq8xNUQElYy65bZvJKAgnhkYHml5ktx9Aeku9faLoUFZwBg/viewform?usp=sf_link" classapp-button" target="_blank">Add Yourself</a>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Find a Geneticist</p>
    </footer>

<script>
function filterTable() {
    const taxonFilter = document.getElementById('taxonFilter').value.toLowerCase();
    const expertiseFilter = document.getElementById('expertiseFilter').value.toLowerCase();
    const subjectFilter = document.getElementById('subjectFilter').value.toLowerCase();
    const iframe = document.getElementById('dataSheet');
    const iframeDocument = iframe.contentDocument || iframe.contentWindow.document;
    const table = iframeDocument.querySelector('table');

    if(!table){
        searchResultsDiv.innerHTML = '<p>Unable to find the table to perform a search.</p>';
        return;
    }

    const rows = table.querySelectorAll('tbody tr');
    rows.forEach(row => {
      const cells = row.querySelectorAll('td');
      let match = true;
      if(taxonFilter && cells[6] && !cells[6].textContent.toLowerCase().includes(taxonFilter)){
          match = false;
      }
      if(expertiseFilter && cells[8] && !cells[8].textContent.toLowerCase().includes(expertiseFilter)){
          match = false;
      }
       if(subjectFilter && cells[7] && !cells[7].textContent.toLowerCase().includes(subjectFilter)){
          match = false;
      }

      if(match){
          row.classList.add('highlight');
      }else{
          row.classList.remove('highlight');
      }
    });
}
function clearFilters() {
    document.getElementById('taxonFilter').value = '';
    document.getElementById('expertiseFilter').value = '';
    document.getElementById('subjectFilter').value = '';
    filterTable();
}
</script>
</body>
</html>
