<script>
    function renderTable(data, highlight = {}) {
        const container = document.getElementById('table-container');
        container.innerHTML = '';

        if (data.length === 0) {
            container.innerHTML = '<p>No data to display.</p>';
            return;
        }

        const table = document.createElement('table');
        table.classList.add('data-table');

        const thead = document.createElement('thead');
        const tbody = document.createElement('tbody');

        const keys = Object.keys(data[0]);

        const headerRow = document.createElement('tr');
        keys.forEach(key => {
            const th = document.createElement('th');
            th.textContent = key;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        data.forEach(row => {
            const tr = document.createElement('tr');
            keys.forEach(key => {
                const td = document.createElement('td');
                const value = row[key] || "";
                if (highlight[key]) {
                    const regex = new RegExp(`\\b(${highlight[key]})\\b`, 'gi');
                    td.innerHTML = value.replace(regex, '<span style="background-color: yellow;">$1</span>');
                } else {
                    td.textContent = value;
                }
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });

        table.appendChild(thead);
        table.appendChild(tbody);
        container.appendChild(table);
    }

    function filterTable() {
        const taxonInput = document.getElementById('taxonFilter').value.trim().toLowerCase();
        const expertiseInput = document.getElementById('expertiseFilter').value.trim().toLowerCase();
        const subjectInput = document.getElementById('subjectFilter').value.trim().toLowerCase();

        const highlightTerms = {
            "Species": taxonInput,
            "Methods": expertiseInput,
            "Area of Expertise": subjectInput
        };

        // Match and rank rows with exact word matches first
        const matchedRows = fullData
            .map(row => {
                let score = 0;
                const rowLower = Object.fromEntries(Object.entries(row).map(([k, v]) => [k, (v || "").toLowerCase()]));

                if (taxonInput && rowLower["Species"]?.split(/[,;]/).map(w => w.trim()).includes(taxonInput)) score += 1;
                if (expertiseInput && rowLower["Methods"]?.split(/[,;]/).map(w => w.trim()).includes(expertiseInput)) score += 1;
                if (subjectInput && rowLower["Area of Expertise"]?.split(/[,;]/).map(w => w.trim()).includes(subjectInput)) score += 1;

                // if it still contains search terms even as substring
                if (score === 0 &&
                    (
                        rowLower["Species"]?.includes(taxonInput) ||
                        rowLower["Methods"]?.includes(expertiseInput) ||
                        rowLower["Area of Expertise"]?.includes(subjectInput)
                    )
                ) {
                    score += 0.5;
                }

                return { row, score };
            })
            .filter(entry => entry.score > 0)
            .sort((a, b) => b.score - a.score)
            .map(entry => entry.row);

        renderTable(matchedRows, highlightTerms);
    }
</script>
