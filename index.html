<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Find a Geneticist</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .filter-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: left;
    }

    th {
      background-color: #f4f4f4;
    }

    .highlight {
      background-color: yellow;
    }

    .add-yourself-section {
      text-align: center;
      margin-top: 20px;
    }

    .add-yourself-section a {
      background-color: #007BFF;
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 6px;
    }

    .add-yourself-section a:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Find a Geneticist</h1>
  <p style="text-align: center;">Search across taxon, subject matter, or data expertise</p>

  <div class="filter-container">
    <input type="text" id="keywordInput" placeholder="Search by keyword (e.g., Mammals, SNPs, eDNA)">
  </div>

  <div id="table-container">
    <p>Loading table...</p>
  </div>

  <div class="add-yourself-section">
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfkq8xNUQElYy65bZvJKAgnhkYHml5ktx9Aeku9faLoUFZwBg/viewform?usp=sf_link" target="_blank">Add Yourself</a>
  </div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqUNyAiN6LQNXDOEKyzLECwPs1GUCFDUJlOopC6Fed3qBpir9MTctGOq9boRKIndSSxBrMvWtY4TK2/pub?gid=332580297&single=true&output=csv";
    let allData = [];

    function fetchCSVData() {
      fetch(SHEET_URL)
        .then(response => response.text())
        .then(csv => {
          allData = parseCSV(csv);
          renderTable(allData);
        })
        .catch(err => {
          document.getElementById("table-container").innerHTML = "<p>Failed to load data.</p>";
          console.error(err);
        });
    }

    function parseCSV(csvText) {
      const lines = csvText.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim());
      return lines.slice(1).map(line => {
        const values = line.split(',').map(v => v.trim());
        const row = {};
        headers.forEach((header, i) => row[header] = values[i]);
        return row;
      });
    }

    function highlightKeyword(text, keyword) {
      const regex = new RegExp(`(${keyword})`, 'gi');
      return text.replace(regex, '<span class="highlight">$1</span>');
    }

    function renderTable(data, keyword = '') {
      const container = document.getElementById("table-container");
      if (!data || data.length === 0) {
        container.innerHTML = "<p>No data available.</p>";
        return;
      }

      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");

      Object.keys(data[0]).forEach(key => {
        const th = document.createElement("th");
        th.textContent = key;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      data.forEach(row => {
        const rowText = Object.values(row).join(' ').toLowerCase();
        if (!keyword || rowText.includes(keyword.toLowerCase())) {
          const tr = document.createElement("tr");
          Object.values(row).forEach(value => {
            const td = document.createElement("td");
            td.innerHTML = keyword ? highlightKeyword(value, keyword) : value;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        }
      });

      table.appendChild(tbody);
      container.innerHTML = '';
      container.appendChild(table);
    }

    document.getElementById("keywordInput").addEventListener("input", e => {
      const keyword = e.target.value.trim();
      renderTable(allData, keyword);
    });

    // Fetch data on load
    fetchCSVData();

    // Refresh data every 24 hours (86,400,000 milliseconds)
    setInterval(fetchCSVData, 86400000);
  </script>
</body>
</html>
